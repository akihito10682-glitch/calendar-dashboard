<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カレンダーダッシュボード</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* ログイン画面 */
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .login-container h1 {
            margin-bottom: 20px;
            color: #667eea;
        }

        #signInButton {
            background: #4285f4;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        #signInButton:hover {
            background: #357ae8;
        }

        /* ダッシュボード */
        .dashboard {
            display: none;
        }

        .dashboard.active {
            display: block;
        }

        /* ヘッダー */
        .header {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .date-time {
            text-align: center;
            margin-bottom: 15px;
        }

        .current-date {
            font-size: 18px;
            color: #666;
            margin-bottom: 8px;
        }

        .current-time {
            font-size: 48px;
            font-weight: bold;
            font-variant-numeric: tabular-nums;
            color: #667eea;
        }

        .period-info {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #f0f0f0;
        }

        .period-item {
            text-align: center;
        }

        .period-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
        }

        .period-value {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }

        .period-next {
            font-size: 12px;
            color: #ff6b6b;
            margin-top: 3px;
        }

        /* 次の予定（メインフォーカス） */
        .next-event {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            min-height: 200px;
        }

        .next-event-header {
            font-size: 14px;
            color: #999;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .next-event-title {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            line-height: 1.3;
        }

        .next-event-time {
            font-size: 18px;
            color: #667eea;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .next-event-location {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .next-event-countdown {
            font-size: 16px;
            color: #ff6b6b;
            font-weight: bold;
            margin-top: 15px;
            padding: 10px;
            background: #fff5f5;
            border-radius: 10px;
            text-align: center;
        }

        .no-event {
            text-align: center;
            color: #999;
            padding: 40px 0;
        }

        /* 進行中の予定 */
        .current-event {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .current-event-header {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .current-event-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .current-event-time {
            font-size: 14px;
            opacity: 0.9;
        }

        .current-event-progress {
            margin-top: 15px;
            background: rgba(255,255,255,0.3);
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
        }

        .current-event-progress-bar {
            height: 100%;
            background: white;
            transition: width 0.3s;
        }

        /* 今日の予定リスト */
        .events-list {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .events-list-header {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .event-item {
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
            background: #f8f9ff;
            border-radius: 8px;
        }

        .event-item.completed {
            opacity: 0.5;
            border-left-color: #ccc;
            background: #f5f5f5;
        }

        .event-item.in-progress {
            border-left-color: #ff6b6b;
            background: #fff5f5;
        }

        .event-item-time {
            font-size: 14px;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .event-item-title {
            font-size: 16px;
            color: #333;
            font-weight: 500;
        }

        .event-item-location {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        /* サインアウトボタン */
        .sign-out-container {
            text-align: center;
            padding: 20px;
        }

        #signOutButton {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            padding: 10px 25px;
            font-size: 14px;
            border-radius: 20px;
            cursor: pointer;
        }

        #signOutButton:hover {
            background: rgba(255,255,255,0.3);
        }

        /* ローディング */
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 18px;
        }

        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* リフレッシュボタン */
        .refresh-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: white;
            border: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s;
        }

        .refresh-button:hover {
            transform: scale(1.1);
        }

        .refresh-button:active {
            transform: rotate(180deg) scale(1.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ログイン画面 -->
        <div id="loginContainer" class="login-container">
            <h1>📅 カレンダーダッシュボード</h1>
            <p>Googleカレンダーと連携して、今日の予定を確認できます</p>
            <button id="signInButton">
                <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg">
                    <path d="M9 3.48c1.69 0 2.83.73 3.48 1.34l2.54-2.48C13.46.89 11.43 0 9 0 5.48 0 2.44 2.02.96 4.96l2.91 2.26C4.6 5.05 6.62 3.48 9 3.48z" fill="#EA4335"/>
                    <path d="M17.64 9.2c0-.74-.06-1.28-.19-1.84H9v3.34h4.96c-.1.83-.64 2.08-1.84 2.92l2.84 2.2c1.7-1.57 2.68-3.88 2.68-6.62z" fill="#4285F4"/>
                    <path d="M3.88 10.78A5.54 5.54 0 0 1 3.58 9c0-.62.11-1.22.29-1.78L.96 4.96A9.008 9.008 0 0 0 0 9c0 1.45.35 2.82.96 4.04l2.92-2.26z" fill="#FBBC05"/>
                    <path d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.84-2.2c-.76.53-1.78.9-3.12.9-2.38 0-4.4-1.57-5.12-3.74L.97 13.04C2.45 15.98 5.48 18 9 18z" fill="#34A853"/>
                </svg>
                Googleでサインイン
            </button>
        </div>

        <!-- ダッシュボード -->
        <div id="dashboard" class="dashboard">
            <!-- ヘッダー（日付・時刻・時限） -->
            <div class="header">
                <div class="date-time">
                    <div class="current-date" id="currentDate">2026年3月23日 月曜日</div>
                    <div class="current-time" id="currentTime">00:00:00</div>
                </div>
                <div class="period-info">
                    <div class="period-item">
                        <div class="period-label">現在</div>
                        <div class="period-value" id="currentPeriod">-</div>
                    </div>
                    <div class="period-item">
                        <div class="period-label">次の時限</div>
                        <div class="period-value" id="nextPeriod">-</div>
                        <div class="period-next" id="nextPeriodTime"></div>
                    </div>
                </div>
            </div>

            <!-- 進行中の予定 -->
            <div id="currentEventContainer" style="display: none;">
                <div class="current-event">
                    <div class="current-event-header">📍 進行中</div>
                    <div class="current-event-title" id="currentEventTitle"></div>
                    <div class="current-event-time" id="currentEventTime"></div>
                    <div class="current-event-progress">
                        <div class="current-event-progress-bar" id="currentEventProgress"></div>
                    </div>
                </div>
            </div>

            <!-- 次の予定（メインフォーカス） -->
            <div class="next-event">
                <div class="next-event-header">⏭️ 次の予定</div>
                <div id="nextEventContent">
                    <div class="no-event">予定がありません</div>
                </div>
            </div>

            <!-- 今日の予定リスト -->
            <div class="events-list">
                <div class="events-list-header">📋 今日の予定</div>
                <div id="eventsList">
                    <div class="no-event">予定を読み込み中...</div>
                </div>
            </div>

            <!-- サインアウト -->
            <div class="sign-out-container">
                <button id="signOutButton">サインアウト</button>
            </div>
        </div>

        <!-- リフレッシュボタン -->
        <button id="refreshButton" class="refresh-button" style="display: none;">
            🔄
        </button>
    </div>

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>

    <script>
        // ★★★ ここにあなたのGoogle Cloud Console OAuth 2.0 クライアントIDを入力 ★★★
        // APIキーは不要です！OAuth認証だけで動作します
        const CLIENT_ID = 'YOUR_CLIENT_ID_HERE.apps.googleusercontent.com';
        
        const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest';
        const SCOPES = 'https://www.googleapis.com/auth/calendar.readonly';

        let tokenClient;
        let gapiInited = false;
        let gisInited = false;
        let accessToken = null;

        // 時間割設定
        const periods = [
            { name: 'SHR', start: { h: 8, m: 40 }, end: { h: 8, m: 50 } },
            { name: '1限', start: { h: 8, m: 55 }, end: { h: 9, m: 45 } },
            { name: '2限', start: { h: 9, m: 55 }, end: { h: 10, m: 45 } },
            { name: '3限', start: { h: 10, m: 55 }, end: { h: 11, m: 45 } },
            { name: '4限', start: { h: 11, m: 55 }, end: { h: 12, m: 45 } },
            { name: '昼休み', start: { h: 12, m: 45 }, end: { h: 13, m: 25 } },
            { name: '5限', start: { h: 13, m: 25 }, end: { h: 14, m: 15 } },
            { name: '6限', start: { h: 14, m: 25 }, end: { h: 15, m: 15 } }
        ];

        // GAPI初期化（APIキー不要版）
        function gapiLoaded() {
            gapi.load('client', initializeGapiClient);
        }

        async function initializeGapiClient() {
            await gapi.client.init({
                discoveryDocs: [DISCOVERY_DOC],
            });
            gapiInited = true;
        }

        // GIS初期化
        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: '',
            });
            gisInited = true;
        }

        // サインイン
        document.addEventListener('DOMContentLoaded', () => {
            window.gapiLoaded = gapiLoaded;
            window.gisLoaded = gisLoaded;

            document.getElementById('signInButton').addEventListener('click', handleAuthClick);
            document.getElementById('signOutButton').addEventListener('click', handleSignoutClick);
            document.getElementById('refreshButton').addEventListener('click', listUpcomingEvents);

            updateClock();
            setInterval(updateClock, 1000);
            
            updatePeriod();
            setInterval(updatePeriod, 60000);
        });

        function handleAuthClick() {
            tokenClient.callback = async (resp) => {
                if (resp.error !== undefined) {
                    throw (resp);
                }
                accessToken = resp.access_token;
                gapi.client.setToken({ access_token: accessToken });
                
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('dashboard').classList.add('active');
                document.getElementById('refreshButton').style.display = 'flex';
                await listUpcomingEvents();
            };

            if (accessToken === null) {
                tokenClient.requestAccessToken({ prompt: 'consent' });
            } else {
                tokenClient.requestAccessToken({ prompt: '' });
            }
        }

        function handleSignoutClick() {
            if (accessToken) {
                google.accounts.oauth2.revoke(accessToken);
                gapi.client.setToken(null);
                accessToken = null;
            }
            document.getElementById('loginContainer').style.display = 'block';
            document.getElementById('dashboard').classList.remove('active');
            document.getElementById('refreshButton').style.display = 'none';
        }

        // カレンダーイベント取得
        async function listUpcomingEvents() {
            let response;
            try {
                const now = new Date();
                const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                const endOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59);

                const request = {
                    'calendarId': 'primary',
                    'timeMin': startOfDay.toISOString(),
                    'timeMax': endOfDay.toISOString(),
                    'showDeleted': false,
                    'singleEvents': true,
                    'orderBy': 'startTime',
                };

                response = await gapi.client.calendar.events.list(request);
            } catch (err) {
                console.error(err);
                return;
            }

            const events = response.result.items;
            if (!events || events.length == 0) {
                document.getElementById('eventsList').innerHTML = '<div class="no-event">今日の予定はありません</div>';
                document.getElementById('nextEventContent').innerHTML = '<div class="no-event">予定がありません</div>';
                return;
            }

            displayEvents(events);
        }

        // イベント表示
        function displayEvents(events) {
            const now = new Date();
            let currentEvent = null;
            let nextEvent = null;
            let upcomingEvents = [];

            events.forEach(event => {
                const start = event.start.dateTime ? new Date(event.start.dateTime) : new Date(event.start.date);
                const end = event.end.dateTime ? new Date(event.end.dateTime) : new Date(event.end.date);

                const eventData = {
                    title: event.summary,
                    start: start,
                    end: end,
                    location: event.location,
                    isAllDay: !event.start.dateTime
                };

                if (now >= start && now < end) {
                    currentEvent = eventData;
                } else if (now < start) {
                    if (!nextEvent) {
                        nextEvent = eventData;
                    } else {
                        upcomingEvents.push(eventData);
                    }
                }
            });

            // 進行中の予定
            if (currentEvent) {
                document.getElementById('currentEventContainer').style.display = 'block';
                document.getElementById('currentEventTitle').textContent = currentEvent.title;
                document.getElementById('currentEventTime').textContent = formatTimeRange(currentEvent.start, currentEvent.end);
                updateProgress(currentEvent.start, currentEvent.end);
            } else {
                document.getElementById('currentEventContainer').style.display = 'none';
            }

            // 次の予定
            if (nextEvent) {
                const timeUntil = getTimeUntil(nextEvent.start);
                document.getElementById('nextEventContent').innerHTML = `
                    <div class="next-event-title">${nextEvent.title}</div>
                    <div class="next-event-time">${formatTimeRange(nextEvent.start, nextEvent.end)}</div>
                    ${nextEvent.location ? `<div class="next-event-location">📍 ${nextEvent.location}</div>` : ''}
                    <div class="next-event-countdown">⏰ ${timeUntil}</div>
                `;
            } else {
                document.getElementById('nextEventContent').innerHTML = '<div class="no-event">これ以上の予定はありません</div>';
            }

            // イベントリスト
            let listHtml = '';
            events.forEach(event => {
                const start = event.start.dateTime ? new Date(event.start.dateTime) : new Date(event.start.date);
                const end = event.end.dateTime ? new Date(event.end.dateTime) : new Date(event.end.date);
                
                let statusClass = '';
                if (now >= end) statusClass = 'completed';
                else if (now >= start && now < end) statusClass = 'in-progress';

                listHtml += `
                    <div class="event-item ${statusClass}">
                        <div class="event-item-time">${formatTimeRange(start, end)}</div>
                        <div class="event-item-title">${event.summary}</div>
                        ${event.location ? `<div class="event-item-location">📍 ${event.location}</div>` : ''}
                    </div>
                `;
            });
            document.getElementById('eventsList').innerHTML = listHtml;
        }

        // 時計更新
        function updateClock() {
            const now = new Date();
            
            const dateStr = now.toLocaleDateString('ja-JP', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                weekday: 'long'
            });
            document.getElementById('currentDate').textContent = dateStr;

            const timeStr = now.toLocaleTimeString('ja-JP', { hour12: false });
            document.getElementById('currentTime').textContent = timeStr;
        }

        // 時限更新
        function updatePeriod() {
            const now = new Date();
            const h = now.getHours();
            const m = now.getMinutes();
            const currentMinutes = h * 60 + m;

            let currentPeriod = '休み時間';
            let nextPeriod = null;
            let nextPeriodTime = null;

            for (let period of periods) {
                const startMinutes = period.start.h * 60 + period.start.m;
                const endMinutes = period.end.h * 60 + period.end.m;

                if (currentMinutes >= startMinutes && currentMinutes < endMinutes) {
                    currentPeriod = period.name;
                    break;
                }
            }

            if (currentMinutes < periods[0].start.h * 60 + periods[0].start.m) {
                currentPeriod = '登校前';
            } else if (currentMinutes >= periods[periods.length - 1].end.h * 60 + periods[periods.length - 1].end.m) {
                currentPeriod = '放課後';
            }

            for (let period of periods) {
                const startMinutes = period.start.h * 60 + period.start.m;
                if (currentMinutes < startMinutes) {
                    nextPeriod = period.name;
                    const diff = startMinutes - currentMinutes;
                    if (diff < 60) {
                        nextPeriodTime = `${diff}分後`;
                    } else {
                        const hours = Math.floor(diff / 60);
                        const mins = diff % 60;
                        nextPeriodTime = `${hours}時間${mins}分後`;
                    }
                    break;
                }
            }

            document.getElementById('currentPeriod').textContent = currentPeriod;
            document.getElementById('nextPeriod').textContent = nextPeriod || '-';
            document.getElementById('nextPeriodTime').textContent = nextPeriodTime || '';
        }

        // 進捗バー更新
        function updateProgress(start, end) {
            const now = new Date();
            const total = end - start;
            const elapsed = now - start;
            const progress = (elapsed / total) * 100;
            document.getElementById('currentEventProgress').style.width = progress + '%';
        }

        // ヘルパー関数
        function formatTimeRange(start, end) {
            const startStr = start.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', hour12: false });
            const endStr = end.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', hour12: false });
            return `${startStr} - ${endStr}`;
        }

        function getTimeUntil(targetTime) {
            const now = new Date();
            const diff = targetTime - now;
            const minutes = Math.floor(diff / 60000);
            
            if (minutes < 60) {
                return `あと${minutes}分で開始`;
            } else {
                const hours = Math.floor(minutes / 60);
                const mins = minutes % 60;
                return `あと${hours}時間${mins}分で開始`;
            }
        }

        setInterval(() => {
            const container = document.getElementById('currentEventContainer');
            if (container.style.display !== 'none') {
                // 必要に応じて進捗バー更新
            }
        }, 60000);
    </script>
</body>
</html>
